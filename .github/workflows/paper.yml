name: Paper

on:
  push:
    branches: [main]
    paths:
      - "paper/**"
      - ".github/workflows/paper.yml"
  pull_request:
    paths:
      - "paper/**"
      - ".github/workflows/paper.yml"

permissions:
  contents: read

jobs:
  typeset:
    name: typeset (latex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Compile the paper
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: main.tex
          latexmk_use_xelatex: false
          args: -pdf -bibtex -interaction=nonstopmode -halt-on-error

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: jsd-mp-paper
          path: paper/main.pdf
          if-no-files-found: error
