name: Paper

on:
  push:
    branches: [main]
    paths:
      - "paper/**"
      - ".github/workflows/paper.yml"
  pull_request:
    paths:
      - "paper/**"
      - ".github/workflows/paper.yml"

permissions:
  contents: read

jobs:
  typeset:
    name: typeset (typst)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1

      - name: Install Typst
        uses: typst-community/setup-typst@v5.1.0

      - name: Compile the paper
        run: typst compile paper/main.typ paper/main.pdf

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: jsd-mp-paper
          path: paper/main.pdf
          if-no-files-found: error
